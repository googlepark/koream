<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어휘 수호대: 국어 타워 디펜스</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }

        body {
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Lobby / Screen States */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #lobby-screen {
            background: linear-gradient(135deg, #1f4068, #162447);
        }

        .lobby-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            color: #4ecca3;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #eeeeee;
            margin-bottom: 30px;
        }

        .map-selection {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .map-btn {
            background: #0f3460;
            border: 2px solid #4ecca3;
            color: white;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .map-btn:hover {
            background: #4ecca3;
            color: #1a1a2e;
            transform: translateY(-3px);
        }

        .map-btn span {
            display: block;
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Main Game Layout */
        #game-screen {
            display: none;
            grid-template-rows: 60px 1fr 200px;
            height: 100vh;
        }

        #game-screen.active {
            display: grid;
        }

        /* Top Status Bar */
        .status-bar {
            background: #162447;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 20px;
            border-bottom: 2px solid #0f3460;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-item .val {
            color: #4ecca3;
            font-size: 1.3rem;
        }

        .buff-active {
            background: #ff4b5c;
            padding: 4px 10px;
            border-radius: 5px;
            animation: pulse 1s infinite alternate;
            font-size: 0.9rem;
            display: none;
        }

        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        /* Middle Gameplay Area */
        .game-main {
            display: grid;
            grid-template-columns: 1fr 220px;
            background: #1a1a2e;
            position: relative;
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #222831;
            padding: 10px;
            position: relative;
        }

        canvas {
            background: #2d4059;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-radius: 8px;
            cursor: crosshair;
        }

        /* Sidebar / Shop UI */
        .sidebar {
            background: #162447;
            border-left: 2px solid #0f3460;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .side-title {
            font-size: 1.1rem;
            color: #4ecca3;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 5px;
            text-align: center;
        }

        .shop-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shop-card {
            background: #0f3460;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shop-card:hover {
            border-color: #4ecca3;
            transform: scale(1.02);
        }

        .shop-card.selected {
            border-color: #e43f5a;
            background: #1f4068;
        }

        .tower-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
        }

        .t-arrow { background: #4ecca3; }
        .t-ice { background: #00bcd4; }
        .t-bomb { background: #ff9800; }

        .tower-info {
            flex-grow: 1;
        }

        .tower-name {
            font-weight: bold;
            font-size: 0.95rem;
        }

        .tower-cost {
            font-size: 0.85rem;
            color: #ffd700;
        }

        /* Control Buttons */
        .control-panel {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
            text-align: center;
        }

        .btn-start { background: #4ecca3; color: #1a1a2e; }
        .btn-speed { background: #0f3460; border: 1px solid #4ecca3; }
        .btn:hover { opacity: 0.9; }

        /* Detail Menu Panel for Selected Tower */
        .detail-panel {
            background: #1f4068;
            border: 1px solid #4ecca3;
            border-radius: 8px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .detail-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #4ecca3;
        }

        .btn-upgrade {
            background: #ff9800;
            color: white;
            font-size: 0.9rem;
            padding: 8px;
        }

        /* Bottom Quiz Area */
        .quiz-area {
            background: #0f3460;
            border-top: 3px solid #4ecca3;
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 15px;
            gap: 20px;
        }

        .quiz-question-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 20px;
        }

        .quiz-type {
            font-size: 0.9rem;
            background: #4ecca3;
            color: #1a1a2e;
            padding: 3px 8px;
            border-radius: 4px;
            width: max-content;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .quiz-text {
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.4;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .option-btn {
            background: #162447;
            border: 1px solid #1f4068;
            color: white;
            border-radius: 8px;
            padding: 15px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: #1f4068;
            border-color: #4ecca3;
        }

        /* Overlay Popups (Lucky Chests, Game Over) */
        .overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .overlay-content {
            background: #162447;
            border: 3px solid #4ecca3;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .chest-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .chest {
            width: 90px;
            height: 90px;
            background: #ff9800;
            border: 4px solid #ff5722;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .chest:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .reward-result {
            font-size: 1.4rem;
            color: #ffd700;
            margin-top: 15px;
            font-weight: bold;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <!-- 1. Lobby/Selection Screen -->
    <div id="lobby-screen" class="screen active">
        <div class="lobby-container">
            <h1>어휘 수호대</h1>
            <p class="subtitle">국어 퀴즈를 풀고 강력한 타워를 배치해 어휘 요괴를 막아내세요!</p>
            <div style="margin-bottom: 15px; font-weight: bold; color: #4ecca3;">난이도 및 맵 선택</div>
            <div class="map-selection">
                <button class="map-btn" onclick="startGame(0)">쉬운 맵 <span>직선 위주의 긴 평화의 길</span></button>
                <button class="map-btn" onclick="startGame(1)">보통 맵 <span>굽이굽이 S자 모양의 계곡</span></button>
                <button class="map-btn" onclick="startGame(2)">어려운 맵 <span>뱅글뱅글 소용돌이 미로</span></button>
                <button class="map-btn" onclick="startGame(3)">지옥 맵 <span>단숨에 돌진하는 지옥의 직선</span></button>
            </div>
        </div>
    </div>

    <!-- 2. Main Gameplay Screen -->
    <div id="game-screen" class="screen">
        <!-- Top Status Bar -->
        <div class="status-bar">
            <div class="status-item">하트: <span id="stat-life" class="val">20</span></div>
            <div class="status-item">골드: <span id="stat-gold" class="val">200</span></div>
            <div class="status-item">웨이브: <span id="stat-wave" class="val">1</span></div>
            <div class="status-item">연속정답: <span id="stat-combo" class="val">0</span></div>
            <div id="buff-indicator" class="buff-active">🔥 공속 2배 (10초)</div>
        </div>

        <!-- Middle Arena -->
        <div class="game-main">
            <!-- Canvas Board Area -->
            <div class="canvas-container">
                <canvas id="gameCanvas" width="800" height="500"></canvas>
            </div>

            <!-- Shop Sidebar -->
            <div class="sidebar">
                <div class="side-title">타워 상점</div>
                <div class="shop-items">
                    <div class="shop-card" id="shop-arrow" onclick="selectShopItem('arrow')">
                        <div class="tower-icon t-arrow">🏹</div>
                        <div class="tower-info">
                            <div class="tower-name">화살 타워</div>
                            <div class="tower-cost">100 골드</div>
                        </div>
                    </div>
                    <div class="shop-card" id="shop-ice" onclick="selectShopItem('ice')">
                        <div class="tower-icon t-ice">❄️</div>
                        <div class="tower-info">
                            <div class="tower-name">얼음 타워</div>
                            <div class="tower-cost">150 골드</div>
                        </div>
                    </div>
                    <div class="shop-card" id="shop-bomb" onclick="selectShopItem('bomb')">
                        <div class="tower-icon t-bomb">💣</div>
                        <div class="tower-info">
                            <div class="tower-name">폭탄 타워</div>
                            <div class="tower-cost">250 골드</div>
                        </div>
                    </div>
                </div>

                <!-- Tower Detail / Upgrade Panel -->
                <div class="detail-panel" id="detail-panel">
                    <div class="detail-title" id="detail-name">타워 정보</div>
                    <div style="font-size: 0.85rem;" id="detail-stats">단계: 1 / 공격력: 10</div>
                    <button class="btn btn-upgrade" id="upgrade-btn" onclick="upgradeSelectedTower()">업그레이드 (100G)</button>
                </div>

                <!-- Action Controls -->
                <div class="control-panel">
                    <button class="btn btn-speed" id="speed-btn" onclick="toggleSpeed()">배속: 1x</button>
                    <button class="btn btn-start" id="wave-btn" onclick="startWave()">웨이브 시작</button>
                </div>
            </div>
        </div>

        <!-- Bottom Quiz Area -->
        <div class="quiz-area">
            <div class="quiz-question-container">
                <div class="quiz-type" id="quiz-type">유의어</div>
                <div class="quiz-text" id="quiz-question">문제를 불러오는 중입니다...</div>
            </div>
            <div class="quiz-options">
                <button class="option-btn" onclick="submitAnswer(0)">1. 보기 1</button>
                <button class="option-btn" onclick="submitAnswer(1)">2. 보기 2</button>
                <button class="option-btn" onclick="submitAnswer(2)">3. 보기 3</button>
                <button class="option-btn" onclick="submitAnswer(3)">4. 보기 4</button>
            </div>
        </div>
    </div>

    <!-- 3. Lucky Reward Chest Overlay -->
    <div id="chest-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="color: #4ecca3; font-size: 2rem;">정답입니다! 🎉</h2>
            <p style="margin-top: 10px;">운을 시험해보세요! 상자 하나를 선택하세요.</p>
            <div class="chest-container">
                <div class="chest" onclick="openChest(0)">🎁</div>
                <div class="chest" onclick="openChest(1)">🎁</div>
                <div class="chest" onclick="openChest(2)">🎁</div>
            </div>
            <div class="reward-result" id="reward-result"></div>
            <button class="btn btn-start" id="chest-close-btn" style="margin-top: 20px; display: none;" onclick="closeChestOverlay()">계속하기</button>
        </div>
    </div>

    <!-- 4. Game Over Overlay -->
    <div id="gameover-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="color: #ff4b5c; font-size: 2.5rem; margin-bottom: 20px;">게임 오버 😢</h2>
            <p id="gameover-summary" style="font-size: 1.2rem; margin-bottom: 30px;">최종 웨이브를 달성했습니다.</p>
            <button class="btn btn-start" onclick="location.reload()">다시 시작하기</button>
        </div>
    </div>

    <!-- JavaScript Game Module logic -->
    <script>
        // --- QUIZ DATA SET (50 Authentic Korean Vocabulary Questions) ---
        const quizDatabase = [
            { question: "'가르치다'의 유의어는 무엇일까요?", options: ["배우다", "지도하다", "지시하다", "모르다"], answer: 1, type: "유의어" },
            { question: "'기쁘다'의 반의어는 무엇일까요?", options: ["슬프다", "즐겁다", "행복하다", "화나다"], answer: 0, type: "반의어" },
            { question: "하늘에 떠 있는 '달'과 한 달 두 달의 '달'은 어떤 관계일까요?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 2, type: "동음이의어" },
            { question: "'손이 크다'에서 '손'은 씀씀이가 좋다는 뜻을 가집니다. 신체 부위 '손'과 이 단어의 관계는?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 3, type: "다의어" },
            { question: "'크다'의 반의어로 알맞은 것은?", options: ["넓다", "길다", "작다", "높다"], answer: 2, type: "반의어" },
            { question: "'어둡다'의 반의어로 알맞은 것은?", options: ["밝다", "하얗다", "빛나다", "맑다"], answer: 0, type: "반의어" },
            { question: "'이야기'의 유의어로 알맞은 것은?", options: ["소문", "대화", "침묵", "약속"], answer: 1, type: "유의어" },
            { question: "'바다'에 있는 '배'와 먹는 과일 '배'의 관계는 무엇일까요?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 2, type: "동음이의어" },
            { question: "'다리가 길다'의 '다리'와 '건너는 다리'의 관계는 무엇일까요?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 2, type: "동음이의어" },
            { question: "'생각'의 유의어로 가장 알맞은 것은?", options: ["상상", "고민", "기억", "의견"], answer: 3, type: "유의어" },
            { question: "'사다'의 반의어로 알맞은 것은?", options: ["팔다", "빌리다", "주다", "받다"], answer: 0, type: "반의어" },
            { question: "'빠르다'의 반의어로 알맞은 것은?", options: ["느리다", "급하다", "천천히", "바쁘다"], answer: 0, type: "반의어" },
            { question: "'동생'의 반의어로 가장 알맞은 단어는?", options: ["친구", "형", "부모", "조카"], answer: 1, type: "반의어" },
            { question: "'이름'의 유의어로 알맞은 것은?", options: ["성명", "명예", "직급", "신분"], answer: 0, type: "유의어" },
            { question: "'친구'의 유의어로 알맞은 것은?", options: ["동료", "이웃", "벗", "스승"], answer: 2, type: "유의어" },
            { question: "숫자 '다섯'을 뜻하는 '오'와 감탄사 '오!'의 관계는?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 2, type: "동음이의어" },
            { question: "'길을 걷다'의 '길'과 '방법'의 의미를 지닌 '길'의 관계는?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 3, type: "다의어" },
            { question: "'성공'의 반의어로 알맞은 것은?", options: ["실패", "좌절", "포기", "노력"], answer: 0, type: "반의어" },
            { question: "'시작'의 반의어로 알맞은 것은?", options: ["출발", "과정", "끝", "중단"], answer: 2, type: "반의어" },
            { question: "'쉽다'의 반의어로 알맞은 것은?", options: ["흔하다", "나쁘다", "틀리다", "어렵다"], answer: 3, type: "반의어" },
            { question: "'아름답다'의 유의어로 알맞은 것은?", options: ["귀엽다", "예쁘다", "착하다", "맑다"], answer: 1, type: "유의어" },
            { question: "'고치다'의 유의어로 가장 알맞은 것은?", options: ["부수다", "만들다", "수리하다", "바꾸다"], answer: 2, type: "유의어" },
            { question: "구멍에 끼우는 '단추'와 이야기의 실마리를 뜻하는 '단추'의 관계는?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 3, type: "다의어" },
            { question: "머리에 쓰는 '모자'와 부모 자식을 뜻하는 '모자'의 관계는?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 2, type: "동음이의어" },
            { question: "'깨끗하다'의 반의어로 알맞은 것은?", options: ["어지럽다", "더럽다", "흐리다", "나쁘다"], answer: 1, type: "반의어" },
            { question: "'안전'의 반의어로 알맞은 것은?", options: ["사고", "위험", "주의", "불안"], answer: 1, type: "반의어" },
            { question: "'행복'의 반의어로 알맞은 것은?", options: ["불행", "슬픔", "고통", "절망"], answer: 0, type: "반의어" },
            { question: "'가득'의 반의어로 알맞은 것은?", options: ["조금", "텅", "듬뿍", "살짝"], answer: 1, type: "반의어" },
            { question: "'차다'의 반의어로 알맞은 것은?", options: ["덥다", "뜨겁다", "따뜻하다", "시원하다"], answer: 1, type: "반의어" },
            { question: "'집'의 유의어로 알맞은 것은?", options: ["고향", "가족", "가옥", "마을"], answer: 2, type: "유의어" },
            { question: "'바라다'의 유의어로 알맞은 것은?", options: ["원하다", "기도하다", "바라보다", "약속하다"], answer: 0, type: "유의어" },
            { question: "'날씨가 좋다'의 '좋다'와 '성품이 훌륭하다'의 '좋다'는 무슨 관계?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 3, type: "다의어" },
            { question: "하늘을 나는 '새'와 시간의 '새(틈)'의 관계는?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 2, type: "동음이의어" },

            { question: "'매일'의 유의어로 알맞은 것은?", options: ["자주", "항상", "날마다", "가끔"], answer: 2, type: "유의어" },
            { question: "'마음'의 유의어로 알맞은 것은?", options: ["생각", "정신", "심리", "가슴"], answer: 2, type: "유의어" },
            { question: "'질문'의 반의어로 알맞은 것은?", options: ["대답", "정답", "설명", "의견"], answer: 0, type: "반의어" },
            { question: "'칭찬'의 반의어로 알맞은 것은?", options: ["꾸중", "비판", "욕설", "거짓말"], answer: 0, type: "반의어" },
            { question: "나무의 '가지'와 물건 종류를 세는 '가지'의 관계는?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 2, type: "동음이의어" },
            { question: "얼굴에 있는 '눈'과 하늘에서 내리는 '눈'의 관계는?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 2, type: "동음이의어" },
            { question: "'중요하다'의 유의어로 알맞은 것은?", options: ["소중하다", "필요하다", "유명하다", "대단하다"], answer: 0, type: "유의어" },
            { question: "'비슷하다'의 반의어로 알맞은 것은?", options: ["다르다", "틀리다", "똑같다", "새롭다"], answer: 0, type: "반의어" },
            { question: "'원인'의 반의어로 알맞은 것은?", options: ["과정", "결과", "이유", "목적"], answer: 1, type: "반의어" },
            { question: "'절약'의 반의어로 알맞은 것은?", options: ["낭비", "소비", "지출", "사치"], answer: 0, type: "반의어" },
            { question: "신체 부위 '머리'와 생각 기능을 뜻하는 '머리가 좋다'의 '머리' 관계는?", options: ["유의어", "반의어", "동음이의어", "다의어"], answer: 3, type: "다의어" },
            { question: "'가깝다'의 반의어로 알맞은 것은?", options: ["멀다", "높다", "넓다", "길다"], answer: 0, type: "반의어" },
            { question: "'틀리다'의 반의어로 알맞은 것은?", options: ["맞다", "옳다", "쉽다", "바르다"], answer: 0, type: "반의어" }
        ];

        // --- GAME SYSTEMS ENGINE CONFIG ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const TILE_SIZE = 50;
        const MAP_COLS = 16;
        const MAP_ROWS = 10;

        let gameState = {
            life: 20,
            gold: 200,
            wave: 1,
            combo: 0,
            selectedMap: 0,
            gameSpeed: 1,
            isWaveActive: false,
            selectedShopItem: null,
            selectedPlacedTower: null,
            buffTimer: 0, // In frames or seconds
            towers: [],
            monsters: [],
            projectiles: [],
            currentQuiz: null
        };

        // Standard 4 Difficulty Paths defined as tile grid check-points
        const maps = [
            // 0: Easy (Long winding snake road)
            [[0,2], [5,2], [5,7], [10,7], [10,3], [15,3]],
            // 1: Normal (S-curve)
            [[0,4], [3,4], [3,1], [8,1], [8,8], [12,8], [12,4], [15,4]],
            // 2: Hard (Spiral maze center loop)
            [[0,1], [14,1], [14,8], [2,8], [2,3], [11,3], [11,6], [5,6], [5,5], [15,5]],
            // 3: Hell (Short rapid near straight)
            [[0,5], [3,5], [3,3], [12,3], [12,5], [15,5]]
        ];

        let activePathPoints = [];

        // Tower Configurations
        const TOWER_TYPES = {
            arrow: { name: "화살 타워", cost: 100, range: 120, damage: 12, cooldown: 30, color: '#4ecca3', emoji: '🏹', type: 'arrow' },
            ice: { name: "얼음 타워", cost: 150, range: 100, damage: 6, cooldown: 40, color: '#00bcd4', emoji: '❄️', type: 'ice' },
            bomb: { name: "폭탄 타워", cost: 250, range: 150, damage: 25, cooldown: 70, color: '#ff9800', emoji: '💣', type: 'bomb' }
        };

        const UPGRADE_COSTS = [100, 150, 250, 400, 600];

        // --- INITIALIZATION AND SCREEN TRANSITIONS ---
        function startGame(mapIndex) {
            gameState.selectedMap = mapIndex;
            activePathPoints = convertGridToPixels(maps[mapIndex]);
            
            document.getElementById('lobby-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            updateUI();
            loadNewQuiz();
            gameLoop();
        }

        function convertGridToPixels(gridPoints) {
            return gridPoints.map(p => ({ x: p[0] * TILE_SIZE + TILE_SIZE/2, y: p[1] * TILE_SIZE + TILE_SIZE/2 }));
        }

        // --- QUIZ LOGIC ---
        function loadNewQuiz() {
            const randomIndex = Math.floor(Math.random() * quizDatabase.length);
            gameState.currentQuiz = quizDatabase[randomIndex];

            document.getElementById('quiz-type').innerText = gameState.currentQuiz.type;
            document.getElementById('quiz-question').innerText = gameState.currentQuiz.question;

            const optionButtons = document.querySelectorAll('.quiz-options .option-btn');
            gameState.currentQuiz.options.forEach((opt, idx) => {
                optionButtons[idx].innerText = `${idx + 1}. ${opt}`;
            });
        }

        function submitAnswer(idx) {
            if (idx === gameState.currentQuiz.answer) {
                // Correct!
                gameState.combo += 1;
                // Launch Lucky Chest Reward Pop-up
                showChestOverlay();
            } else {
                // Incorrect
                gameState.combo = 0;
                alert("아쉽습니다! 오답입니다. 다음 문제를 풀어보세요.");
                updateUI();
                loadNewQuiz();
            }
        }

        // --- LUCKY CHEST SYSTEM ---
        function showChestOverlay() {
            document.getElementById('reward-result').innerText = "";
            document.getElementById('chest-close-btn').style.display = "none";
            
            // Re-enable chests interaction
            const chests = document.querySelectorAll('.chest');
            chests.forEach(c => c.style.pointerEvents = 'auto');

            document.getElementById('chest-overlay').style.display = 'flex';
        }

        function openChest(chestIdx) {
            // Disallow clicking multiple chests
            const chests = document.querySelectorAll('.chest');
            chests.forEach(c => c.style.pointerEvents = 'none');

            const roll = Math.random();
            let resultText = "";

            // Calculate combo multiplier bonus
            let comboBonus = Math.floor(gameState.combo * 5);

            if (roll < 0.35) {
                let goldGained = 100 + comboBonus;
                gameState.gold += goldGained;
                resultText = `💰 일반 골드 대박! +${goldGained} 골드 획득! (콤보 보너스 포함)`;
            } else if (roll < 0.65) {
                let goldGained = 300 + comboBonus;
                gameState.gold += goldGained;
                resultText = `💎 메가 골드 대박! +${goldGained} 골드 획득! (콤보 보너스 포함)`;
            } else {
                gameState.buffTimer = 600; // 10 seconds at 60fps base
                resultText = `🔥 초강력 공속 버프! 10초간 모든 타워의 공격 속도가 2배가 됩니다!`;
            }

            document.getElementById('reward-result').innerText = resultText;
            document.getElementById('chest-close-btn').style.display = "inline-block";
            updateUI();
        }

        function closeChestOverlay() {
            document.getElementById('chest-overlay').style.display = 'none';
            loadNewQuiz();
        }

        // --- INTERACTIVE MAP PLACEMENT & SELECTION ---
        function selectShopItem(type) {
            // Toggle selection
            if (gameState.selectedShopItem === type) {
                gameState.selectedShopItem = null;
            } else {
                gameState.selectedShopItem = type;
                gameState.selectedPlacedTower = null; // Unselect placed tower
            }
            updateUI();
        }

        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const tileX = Math.floor(mouseX / TILE_SIZE);
            const tileY = Math.floor(mouseY / TILE_SIZE);

            // 1. If a shop item is selected, try to place it
            if (gameState.selectedShopItem) {
                const spec = TOWER_TYPES[gameState.selectedShopItem];
                
                // Validate if tile is part of road path
                if (isTileOnPath(tileX, tileY)) {
                    alert("몬스터가 다니는 길 위에는 타워를 설치할 수 없습니다!");
                    return;
                }

                // Check if already occupied
                const occupied = gameState.towers.some(t => t.tileX === tileX && t.tileY === tileY);
                if (occupied) {
                    alert("이미 타워가 배치된 자리입니다!");
                    return;
                }

                if (gameState.gold < spec.cost) {
                    alert("골드가 부족합니다! 퀴즈를 맞춰 골드를 모으세요.");
                    return;
                }

                // Deduct & Construct
                gameState.gold -= spec.cost;
                gameState.towers.push({
                    tileX: tileX,
                    tileY: tileY,
                    x: tileX * TILE_SIZE + TILE_SIZE/2,
                    y: tileY * TILE_SIZE + TILE_SIZE/2,
                    type: spec.type,
                    level: 1,
                    range: spec.range,
                    damage: spec.damage,
                    cooldown: spec.cooldown,
                    currentCooldown: 0,
                    spec: spec
                });

                gameState.selectedShopItem = null;
                updateUI();
                return;
            }

            // 2. Otherwise, check if user clicked on an existing tower to inspect/upgrade
            const clickedTower = gameState.towers.find(t => t.tileX === tileX && t.tileY === tileY);
            if (clickedTower) {
                gameState.selectedPlacedTower = clickedTower;
            } else {
                gameState.selectedPlacedTower = null;
            }
            updateUI();
        });

        // Helper to check if a specific grid node falls anywhere on the path grid lines
        function isTileOnPath(tx, ty) {
            const currentMapLayout = maps[gameState.selectedMap];
            for (let i = 0; i < currentMapLayout.length - 1; i++) {
                let p1 = currentMapLayout[i];
                let p2 = currentMapLayout[i+1];

                let minX = Math.min(p1[0], p2[0]);
                let maxX = Math.max(p1[0], p2[0]);
                let minY = Math.min(p1[1], p2[1]);
                let maxY = Math.max(p1[1], p2[1]);

                if (tx >= minX && tx <= maxX && ty >= minY && ty <= maxY) {
                    return true;
                }
            }
            return false;
        }

        function upgradeSelectedTower() {
            const tower = gameState.selectedPlacedTower;
            if (!tower || tower.level >= 5) return;

            const cost = UPGRADE_COSTS[tower.level - 1];
            if (gameState.gold < cost) {
                alert("골드가 부족합니다!");
                return;
            }

            gameState.gold -= cost;
            tower.level += 1;
            tower.damage = Math.round(tower.damage * 1.3);
            tower.range = Math.round(tower.range * 1.15);
            
            updateUI();
        }

        // --- GAME CONTROLS & LOOP WAVE MANAGEMENT ---
        function toggleSpeed() {
            if (gameState.gameSpeed === 1) gameState.gameSpeed = 2;
            else if (gameState.gameSpeed === 2) gameState.gameSpeed = 4;
            else gameState.gameSpeed = 1;

            document.getElementById('speed-btn').innerText = `배속: ${gameState.gameSpeed}x`;
        }

        function startWave() {
            if (gameState.isWaveActive) return;
            gameState.isWaveActive = true;
            document.getElementById('wave-btn').disabled = true;

            // Spawn 5 Monsters or 1 Big Boss
            let count = 5;
            let isBossWave = (gameState.wave % 5 === 0);
            
            // HP Scaling: exponential 1.5x factor per wave
            let baseHp = 30 * Math.pow(1.5, gameState.wave - 1);
            let speed = 1.2;

            if (isBossWave) {
                // Boss characteristics
                gameState.monsters.push({
                    x: activePathPoints[0].x,
                    y: activePathPoints[0].y,
                    pathIndex: 0,
                    hp: baseHp * 10,
                    maxHp: baseHp * 10,
                    speed: speed * 0.5,
                    size: 24,
                    isBoss: true,
                    slowTimer: 0,
                    weakness: "다의어" // Specific type monster vulnerability strategy
                });
            } else {
                // Regular Wave
                let delay = 0;
                // Mixed vocabulary type weaknesses assigned randomly
                const types = ["유의어", "반의어", "동음이의어", "다의어"];
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        if (!gameState.isWaveActive) return; // fail-safe if game reset
                        gameState.monsters.push({
                            x: activePathPoints[0].x,
                            y: activePathPoints[0].y,
                            pathIndex: 0,
                            hp: baseHp,
                            maxHp: baseHp,
                            speed: speed,
                            size: 14,
                            isBoss: false,
                            slowTimer: 0,
                            weakness: types[Math.floor(Math.random() * types.length)]
                        });
                    }, delay);
                    delay += 1000 / gameState.gameSpeed;
                }
            }
        }

        // --- ENGINE LOOP RENDER & UPDATE ---
        function gameLoop() {
            // Handle speed multiplying logic safely via loops
            for (let step = 0; step < gameState.gameSpeed; step++) {
                updateGameFrame();
            }

            renderGameFrame();

            if (gameState.life <= 0) {
                endGame();
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function updateGameFrame() {
            // 1. Manage Buff Timers
            if (gameState.buffTimer > 0) {
                gameState.buffTimer--;
                document.getElementById('buff-indicator').style.display = 'block';
            } else {
                document.getElementById('buff-indicator').style.display = 'none';
            }

            // 2. Move Monsters
            for (let i = gameState.monsters.length - 1; i >= 0; i--) {
                let m = gameState.monsters[i];
                
                // Slow effect logic
                let currentSpeed = m.speed;
                if (m.slowTimer > 0) {
                    m.slowTimer--;
                    currentSpeed *= 0.5;
                }

                let target = activePathPoints[m.pathIndex + 1];
                if (!target) {
                    // Reached end! Deduct life
                    gameState.life -= (m.isBoss ? 5 : 1);
                    gameState.monsters.splice(i, 1);
                    updateUI();
                    checkWaveEnd();
                    continue;
                }

                // Vector heading
                let dx = target.x - m.x;
                let dy = target.y - m.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist <= currentSpeed) {
                    m.x = target.x;
                    m.y = target.y;
                    m.pathIndex++;
                } else {
                    m.x += (dx / dist) * currentSpeed;
                    m.y += (dy / dist) * currentSpeed;
                }
            }

            // 3. Towers Action AI
            gameState.towers.forEach(t => {
                if (t.currentCooldown > 0) {
                    // If speed buff is active, cooling down ticks twice as fast
                    t.currentCooldown -= (gameState.buffTimer > 0 ? 2 : 1);
                    return;
                }

                // Find first visible monster in range
                let targetMonster = null;
                for (let m of gameState.monsters) {
                    let tdx = m.x - t.x;
                    let tdy = m.y - t.y;
                    if (Math.sqrt(tdx*tdx + tdy*tdy) <= t.range) {
                        targetMonster = m;
                        break;
                    }
                }

                if (targetMonster) {
                    // Fire Projectile
                    gameState.projectiles.push({
                        x: t.x,
                        y: t.y,
                        target: targetMonster,
                        speed: 5,
                        damage: t.damage,
                        type: t.type,
                        level: t.level
                    });
                    t.currentCooldown = t.cooldown;
                }
            });

            // 4. Update Projectiles
            for (let i = gameState.projectiles.length - 1; i >= 0; i--) {
                let p = gameState.projectiles[i];
                
                // If target died already, clear projectile
                if (!gameState.monsters.includes(p.target)) {
                    gameState.projectiles.splice(i, 1);
                    continue;
                }

                let pdx = p.target.x - p.x;
                let pdy = p.target.y - p.y;
                let pdist = Math.sqrt(pdx*pdx + pdy*pdy);

                if (pdist <= p.speed) {
                    // Hit target! Apply damage rules
                    let totalDamage = p.damage;
                    
                    // Specific Attribute/Quiz Combo Bonus: 
                    // If monster weakness matches current combo style or active quiz category, apply 1.5x bonus
                    if (p.target.weakness === gameState.currentQuiz.type) {
                        totalDamage = Math.round(totalDamage * 1.5);
                    }

                    p.target.hp -= totalDamage;

                    // Apply status effects based on elemental tower type
                    if (p.type === 'ice') {
                        p.target.slowTimer = 180; // 3 seconds at 60fps base
                    } else if (p.type === 'bomb') {
                        // Explosion Area Splash damage 1.5 tiles radius (75px)
                        gameState.monsters.forEach(m_splash => {
                            if (m_splash !== p.target) {
                                let sdx = m_splash.x - p.target.x;
                                let sdy = m_splash.y - p.target.y;
                                if (Math.sqrt(sdx*sdx + sdy*sdy) <= 75) {
                                    m_splash.hp -= Math.round(totalDamage * 0.6); // Splash takes 60% damage
                                }
                            }
                        });
                    }

                    // Remove monster if dead
                    if (p.target.hp <= 0) {
                        let idx = gameState.monsters.indexOf(p.target);
                        if (idx > -1) {
                            gameState.monsters.splice(idx, 1);
                            // Award gold on elimination
                            gameState.gold += (p.target.isBoss ? 50 : 10);
                            updateUI();
                        }
                    }

                    gameState.projectiles.splice(i, 1);
                    checkWaveEnd();
                } else {
                    p.x += (pdx / pdist) * p.speed;
                    p.y += (pdy / pdist) * p.speed;
                }
            }
        }

        function checkWaveEnd() {
            if (gameState.monsters.length === 0 && gameState.isWaveActive) {
                // Wave cleared cleanly!
                gameState.isWaveActive = false;
                gameState.wave += 1;
                document.getElementById('wave-btn').disabled = false;
                updateUI();
            }
        }

        function renderGameFrame() {
            // Clear Frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Background Grid visual helper
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            ctx.lineWidth = 1;
            for (let c = 0; c < MAP_COLS; c++) {
                ctx.beginPath();
                ctx.moveTo(c * TILE_SIZE, 0);
                ctx.lineTo(c * TILE_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let r = 0; r < MAP_ROWS; r++) {
                ctx.beginPath();
                ctx.moveTo(0, r * TILE_SIZE);
                ctx.lineTo(canvas.width, r * TILE_SIZE);
                ctx.stroke();
            }

            // Draw Paths
            ctx.strokeStyle = "#eef3f7";
            ctx.lineWidth = 32;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(activePathPoints[0].x, activePathPoints[0].y);
            for (let i = 1; i < activePathPoints.length; i++) {
                ctx.lineTo(activePathPoints[i].x, activePathPoints[i].y);
            }
            ctx.stroke();

            // Inner styling for road path look
            ctx.strokeStyle = "#d1dbe4";
            ctx.lineWidth = 26;
            ctx.stroke();

            // Draw Range Indicators if a tower is selected
            if (gameState.selectedPlacedTower) {
                ctx.fillStyle = "rgba(78, 204, 163, 0.15)";
                ctx.beginPath();
                ctx.arc(gameState.selectedPlacedTower.x, gameState.selectedPlacedTower.y, gameState.selectedPlacedTower.range, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = "#4ecca3";
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Draw Placed Towers
            gameState.towers.forEach(t => {
                ctx.fillStyle = t.spec.color;
                ctx.beginPath();
                ctx.arc(t.x, t.y, 18, 0, Math.PI*2);
                ctx.fill();
                
                // Max level special gold ring styling
                if (t.level === 5) {
                    ctx.strokeStyle = "#ffd700";
                    ctx.lineWidth = 3;
                    ctx.stroke();
                } else {
                    ctx.strokeStyle = "#ffffff";
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                // Render Emoji center icon
                ctx.fillStyle = "#ffffff";
                ctx.font = "14px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(t.spec.emoji, t.x, t.y);

                // Level Tag display
                ctx.fillStyle = "#1a1a2e";
                ctx.font = "bold 10px Arial";
                ctx.fillText(`Lv.${t.level}`, t.x, t.y + 12);
            });

            // Draw Monsters
            gameState.monsters.forEach(m => {
                // Outer circle body
                ctx.fillStyle = m.isBoss ? "#ff4b5c" : "#e43f5a";
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.size, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();

                // Weakness text marker above head
                ctx.fillStyle = "#ffffd0";
                ctx.font = "bold 10px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(`약점:${m.weakness}`, m.x, m.y - m.size - 14);

                // Draw Simple HP Bar
                let barW = m.size * 2;
                let barH = 4;
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(m.x - barW/2, m.y - m.size - 8, barW, barH);

                let healthRatio = Math.max(0, m.hp / m.maxHp);
                ctx.fillStyle = "#4ecca3";
                ctx.fillRect(m.x - barW/2, m.y - m.size - 8, barW * healthRatio, barH);
            });

            // Draw Projectiles
            gameState.projectiles.forEach(p => {
                ctx.fillStyle = p.type === 'ice' ? '#00bcd4' : p.type === 'bomb' ? '#ff9800' : '#ffffff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.type === 'bomb' ? 5 : 3, 0, Math.PI*2);
                ctx.fill();
            });
        }

        // --- UI TEXT RENDER SYNC ---
        function updateUI() {
            document.getElementById('stat-life').innerText = gameState.life;
            document.getElementById('stat-gold').innerText = gameState.gold;
            document.getElementById('stat-wave').innerText = gameState.wave;
            document.getElementById('stat-combo').innerText = gameState.combo;

            // Highlight chosen item card in store shop UI
            document.querySelectorAll('.shop-card').forEach(card => card.classList.remove('selected'));
            if (gameState.selectedShopItem) {
                document.getElementById(`shop-${gameState.selectedShopItem}`).classList.add('selected');
            }

            // Inspect Tower Upgrade Panel Menu Controller
            const detailPanel = document.getElementById('detail-panel');
            if (gameState.selectedPlacedTower) {
                const t = gameState.selectedPlacedTower;
                detailPanel.style.display = 'flex';
                document.getElementById('detail-name').innerText = `${t.spec.name} (Lv.${t.level})`;
                document.getElementById('detail-stats').innerText = `공격력: ${t.damage} / 사거리: ${t.range}`;
                
                const upBtn = document.getElementById('upgrade-btn');
                if (t.level < 5) {
                    const cost = UPGRADE_COSTS[t.level - 1];
                    upBtn.innerText = `업그레이드 (${cost}G)`;
                    upBtn.disabled = false;
                } else {
                    upBtn.innerText = `최대 레벨 달성 (MAX)`;
                    upBtn.disabled = true;
                }
            } else {
                detailPanel.style.display = 'none';
            }
        }

        function endGame() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('gameover-summary').innerText = `최종 달성 웨이브: ${gameState.wave}단계`;
            document.getElementById('gameover-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
